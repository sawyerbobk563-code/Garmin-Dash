<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Garmin Steps</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-md bg-slate-800 rounded-3xl p-8 shadow-xl border border-slate-700">
        <header class="text-center mb-8">
            <h1 class="text-2xl font-bold">Garmin Step Tracker</h1>
            <p id="status-text" class="text-slate-400 text-sm mt-2">Connect your account to see live data</p>
        </header>

        <!-- Form Section -->
        <div id="auth-section" class="space-y-4">
            <div id="login-inputs">
                <input type="email" id="email" placeholder="Email" class="w-full p-3 rounded-lg bg-slate-700 border-none mb-3 focus:ring-2 focus:ring-blue-500">
                <input type="password" id="password" placeholder="Password" class="w-full p-3 rounded-lg bg-slate-700 border-none focus:ring-2 focus:ring-blue-500">
                <button onclick="login()" class="w-full mt-4 bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500 transition">Login</button>
            </div>

            <div id="mfa-inputs" class="hidden space-y-4">
                <div class="bg-slate-700/50 border border-slate-600 rounded-xl p-3 text-center">
                    <p class="text-sm text-slate-300 mb-1">Check your email for the code!</p>
                    <p id="timer-display" class="text-blue-400 font-bold text-lg">60s</p>
                </div>
                <input type="text" id="mfa-code" placeholder="6-digit code" class="w-full p-3 rounded-lg bg-slate-700 border-none text-center text-xl tracking-widest outline-none focus:ring-2 focus:ring-green-500">
                <button onclick="verifyMFA()" class="w-full mt-4 bg-green-600 py-3 rounded-lg font-bold hover:bg-green-500 transition">Verify Code</button>
            </div>
        </div>

        <!-- Data Section -->
        <div id="data-section" class="hidden text-center space-y-6">
            <div class="relative inline-flex items-center justify-center">
                <svg class="w-48 h-48">
                    <circle cx="96" cy="96" r="88" stroke="currentColor" stroke-width="12" fill="transparent" class="text-slate-700" />
                    <circle cx="96" cy="96" r="88" stroke="currentColor" stroke-width="12" fill="transparent" class="text-blue-500" stroke-dasharray="552.92" stroke-dashoffset="150" stroke-linecap="round" />
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span id="step-count" class="text-4xl font-black">0</span>
                    <span class="text-slate-400 text-xs uppercase">Steps Today</span>
                </div>
            </div>
            <div class="bg-slate-700/50 p-4 rounded-2xl">
                <p class="text-sm text-slate-300">Daily Goal: <span id="step-goal" class="font-bold text-white">--</span></p>
            </div>
            <button onclick="fetchSteps()" class="text-blue-400 text-sm hover:text-blue-300">↻ Refresh Data</button>
        </div>
    </div>

    <script>
        // Set up the API URL to work perfectly with Render
        const API_URL = '/api';
        
        let userEmail = "";
        let countdownInterval;

        async function login() {
            const emailInput = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            userEmail = emailInput; // Save email to send with the MFA code
            updateStatus("Connecting to Garmin...");

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, password })
                });
                const data = await response.json();

                if (data.status === 'mfa_required') {
                    document.getElementById('login-inputs').classList.add('hidden');
                    document.getElementById('mfa-inputs').classList.remove('hidden');
                    updateStatus("MFA Required");
                    startTimer(60); // Start 60-second timer
                } else if (data.status === 'success') {
                    showDashboard();
                } else {
                    updateStatus(data.message || "Login failed");
                }
            } catch (err) {
                updateStatus("Error connecting to server");
            }
        }

        async function verifyMFA() {
            const code = document.getElementById('mfa-code').value;
            updateStatus("Verifying...");

            try {
                const response = await fetch(`${API_URL}/verify-mfa`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // Send BOTH the email and the code to the backend
                    body: JSON.stringify({ email: userEmail, code })
                });
                
                const data = await response.json();
                
                if (response.ok && data.status === 'success') {
                    clearInterval(countdownInterval);
                    showDashboard();
                } else {
                    updateStatus(data.message || "Invalid MFA code");
                }
            } catch (err) {
                updateStatus("Verification failed.");
            }
        }

        async function fetchSteps() {
            try {
                const response = await fetch(`${API_URL}/steps`);
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('step-count').innerText = data.steps.toLocaleString();
                    document.getElementById('step-goal').innerText = data.goal.toLocaleString();
                    updateStatus("Live Tracker Connected");
                } else {
                    updateStatus("Could not load steps. Please login again.");
                }
            } catch (err) {
                updateStatus("Failed to load steps");
            }
        }

        function showDashboard() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('mfa-inputs').classList.add('hidden');
            document.getElementById('data-section').classList.remove('hidden');
            updateStatus("Loading steps...");
            fetchSteps();
        }

        function startTimer(secondsLeft) {
            const display = document.getElementById('timer-display');
            display.innerText = `${secondsLeft}s`;
            
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                secondsLeft--;
                display.innerText = `${secondsLeft}s`;
                
                if (secondsLeft <= 0) {
                    clearInterval(countdownInterval);
                    display.innerText = "Expired";
                    updateStatus("Session may have expired. Refresh to try again.");
                }
            }, 1000);
        }

        function updateStatus(msg) {
            document.getElementById('status-text').innerText = msg;
        }
    </script>
</body>
</html>
