<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garmin Step Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-slate-800 rounded-3xl p-8 shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-bold text-center mb-8">My <span class="text-blue-500">Steps</span></h1>

        <!-- Step 1: Login Section -->
        <div id="login-section" class="space-y-4">
            <input type="email" id="email" placeholder="Garmin Email" class="w-full p-4 rounded-xl bg-slate-700 border-none outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="password" placeholder="Password" class="w-full p-4 rounded-xl bg-slate-700 border-none outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold transition">Connect</button>
        </div>

        <!-- Step 2: MFA Section -->
        <div id="mfa-section" class="hidden space-y-4">
            <p class="text-center text-slate-400 text-sm">Check your email for the code!</p>
            
            <!-- The Countdown Timer -->
            <div class="bg-red-900/30 border border-red-500/50 rounded-xl p-3 text-center">
                <p id="timer-display" class="text-red-400 font-bold text-lg">15s</p>
                <p class="text-xs text-red-300">Enter code before session expires</p>
            </div>

            <input type="text" id="mfa-code" placeholder="6-Digit Code" class="w-full p-4 rounded-xl bg-slate-700 text-center text-2xl tracking-widest outline-none focus:ring-2 focus:ring-green-500">
            <button onclick="handleMFA()" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-xl font-bold transition">Verify</button>
        </div>

        <!-- Step 3: Dashboard Section -->
        <div id="dashboard-section" class="hidden text-center space-y-6 py-10">
            <div id="step-count" class="text-7xl font-black text-blue-400">0</div>
            <p class="text-slate-500 uppercase tracking-widest text-xs">Steps Today</p>
            <button onclick="getSteps()" class="text-blue-500 text-sm hover:underline mt-4">↻ Refresh Data</button>
        </div>

        <p id="status-msg" class="mt-6 text-center text-sm text-yellow-400 font-medium"></p>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        
        // We need to remember the email to send it with the MFA code
        let userEmail = ""; 
        let countdownInterval;

        async function handleLogin() {
            userEmail = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            setStatus("Contacting Garmin...");

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, password: password })
                });
                const data = await response.json();
                
                if (data.status === 'mfa_required') {
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('mfa-section').classList.remove('hidden');
                    setStatus("");
                    startTimer(15); // Start the 15 second timer!
                } else if (data.status === 'success') {
                    showDashboard();
                } else {
                    setStatus(data.message || "Login failed");
                }
            } catch (err) {
                setStatus("Server error. Check your connection.");
            }
        }

        async function handleMFA() {
            const code = document.getElementById('mfa-code').value;
            setStatus("Verifying code...");

            try {
                const response = await fetch(`${API_BASE}/verify-mfa`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // IMPORTANT FIX: We are now sending BOTH the email and the code
                    body: JSON.stringify({ email: userEmail, code: code }) 
                });
                
                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    clearInterval(countdownInterval); // Stop the timer
                    showDashboard();
                } else {
                    // Show exactly what the server says went wrong
                    setStatus(data.message || data.error || "Invalid code");
                }
            } catch (err) {
                setStatus("Failed to connect to server.");
            }
        }

        async function getSteps() {
            try {
                const response = await fetch(`${API_BASE}/steps`);
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('step-count').innerText = data.steps.toLocaleString();
                    setStatus("Data updated!");
                    setTimeout(() => setStatus(""), 3000); // Clear success message after 3 seconds
                } else {
                    setStatus(data.error || "Failed to load steps");
                }
            } catch (err) {
                setStatus("Could not fetch steps.");
            }
        }

        function showDashboard() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('mfa-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
            setStatus("Loading steps...");
            getSteps();
        }

        function startTimer(secondsLeft) {
            const display = document.getElementById('timer-display');
            display.innerText = `${secondsLeft}s`;
            
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                secondsLeft--;
                display.innerText = `${secondsLeft}s`;
                
                if (secondsLeft <= 0) {
                    clearInterval(countdownInterval);
                    display.innerText = "0s";
                    setStatus("Time's up! The session likely expired. Refresh the page to try again.");
                }
            }, 1000);
        }

        function setStatus(msg) {
            document.getElementById('status-msg').innerText = msg;
        }
    </script>
</body>
</html>
